# Railway deployment — https://docs.railway.com/reference/config-as-code
# Connect repo → add PostgreSQL plugin → set env vars → deploy

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
